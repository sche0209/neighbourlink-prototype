<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeighbourLink - Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

  <div class="header">
    <div class="brand">NeighbourLink</div>
    <p>Offer rides or find one</p>
  </div>

  <div class="content">
    <h2>Create your account</h2>

    <div class="row">
      <div>
        <label>First Name*</label>
        <input value="Emma">
      </div>
      <div>
        <label>Last Name*</label>
        <input value="Clarke">
      </div>
    </div>

    <label>Phone number*</label>
    <input placeholder="04XX XXX XXX">

    <div style="height: 60px;"></div>

    <label>Date of Birth*</label>
    <div class="row">
      <input placeholder="DD">
      <input placeholder="MM">
      <input placeholder="YYYY">
    </div>

    <label>Address*</label>
    <input placeholder="Street Address">

    <label>Password*</label>
    <input type="password" value="password">

    <div style="height: 45px;"></div>

    <a class="button" href="dashboard.html">Create account →</a>

    <p style="text-align:center;">
      Already have an account?
      <a href="dashboard.html" style="color:#65a17d; font-weight:bold;">Log in</a>
    </p>
  </div>

</div>

</body>
</html>
